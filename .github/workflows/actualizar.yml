name: Actualizar resultados

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 08:00 hora España (verano)
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Actualizar resultados
        run: python actualizar.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/data.js
          git diff --cached --quiet || git commit -m "resultados $(date +%Y-%m-%d)"
          git push
